


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giphy App</title>
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap (optional but nice layout) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container text-center mt-4">

  <h1>Search GIFs 🎉</h1>

  <!-- Search input -->
  <input 
    type="text" 
    id="search-input" 
    placeholder="Search gifs..." 
    class="form-control mb-3"
  >

  <!-- Button -->
  <button id="fetch-gif-btn" class="btn btn-primary mb-4">
    Fetch GIFs
  </button>

  <!-- GIF container -->
  <div id="gif-container" class="row"></div>
  
  <script src="js/script.js"></script>
</body>
</html>
